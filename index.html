<script>
    const API_BASE_URL = 'https://zentune.onrender.com';
    let ytPlayer, trackPool = [], poolIdx = 0, timerInterval = null, seconds = 0;
    let isPaused = false;
    
    // 1. Immediate Session Check
    let userId = sessionStorage.getItem('zentune_id'); 

    window.onload = () => { 
        console.log("ZenTune System Initialized...");
        if(userId) {
            console.log("Found existing session for:", userId);
            showUser(userId); 
        } else {
            console.log("No session found. Showing guide.");
            openGuide();
        }
        updateAura(); 
    };

    // 2. Auth & UI Logic
    async function login() {
        const idInput = document.getElementById('uidInput');
        const id = idInput.value.trim();
        if(!id) return;

        console.log("Attempting login for:", id);
        try {
            const res = await fetch(`${API_BASE_URL}/auth`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: id, 
                    password: "default_password" // Required for app2.py
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                userId = data.user_id;
                sessionStorage.setItem('zentune_id', userId);
                showUser(userId);
            } else {
                alert("Login Error: " + (data.message || "Unknown error"));
            }
        } catch (e) {
            console.error("Login Fetch Error:", e);
            alert("Server is starting up. Please wait 10 seconds and try again.");
        }
    }

    function showUser(id) { 
        console.log("Updating UI for user:", id);
        const loginForm = document.getElementById('loginForm');
        const greeting = document.getElementById('userGreeting');
        const label = document.getElementById('userLabel');

        if(loginForm) loginForm.style.display = 'none'; 
        if(greeting) greeting.style.display = 'block'; 
        if(label) label.innerText = `Welcome, ${id}`; 
        
        fetchStats(); 
    }

    // 3. YouTube & Playback Logic
    function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('player', {
        height: '100%',
        width: '100%',
        playerVars: { 
            'autoplay': 1, 
            'controls': 0, 
            'enablejsapi': 1,
            'origin': window.location.origin, // THIS LINE FIXES THE POSTMESSAGE ERROR
            'widget_referrer': window.location.origin
        },
        events: { 
            'onStateChange': onPlayerStateChange,
            'onReady': onPlayerReady,
            'onError': onPlayerError
        }
    });
}

function onPlayerReady(event) {
    console.log("YouTube Player is ready and secured.");
}

function onPlayerError(event) {
    console.error("YouTube Player Error:", event.data);
    // If a video is blocked/unembeddable, skip to the next one automatically
    if (event.data === 101 || event.data === 150) {
        console.warn("Video unplayable, shuffling...");
        shuffle();
    }
}

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            isPaused = false;
            document.getElementById('playPauseBtn').innerText = "Pause";
            runTimer();
        } else if (event.data == YT.PlayerState.PAUSED) {
            isPaused = true;
            document.getElementById('playPauseBtn').innerText = "Play";
            clearInterval(timerInterval);
        } else if (event.data == YT.PlayerState.ENDED) {
            if(document.getElementById('flowTog').checked) shuffle();
        }
    }

    async function calibrate() {
        const mood = document.getElementById('moodInput').value;
        const btn = document.getElementById('calBtn');
        btn.innerText = "Analyzing..."; 
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE_URL}/identify?t=${Date.now()}`, {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({mood: mood, user_id: userId || "guest"})
            });
            const data = await res.json();
            if(data.status==='success' && data.tracks.length > 0) { 
                trackPool = data.tracks; 
                poolIdx = 0; 
                playTrack(0);
                document.getElementById('result').style.display='block';
                document.getElementById('sessionControls').style.display='flex';
                document.getElementById('volContainer').style.display='flex';
                resetSessionState(); 
                runTimer();
            }
        } catch(e) { 
            console.error("Calibration Error:", e);
        }
        btn.innerText = "Calibrate"; 
        btn.disabled = false;
    }

    function playTrack(idx) {
        if (!trackPool[idx]) return;
        const url = trackPool[idx].preview_url;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        const vidId = (match && match[2].length == 11) ? match[2] : url.split('/').pop();

        if (ytPlayer && ytPlayer.loadVideoById) {
            ytPlayer.loadVideoById(vidId);
            document.getElementById('trackTitle').innerText = trackPool[idx].title;
        }
    }

    // 4. Utility Functions (Insights, Theme, Timer)
    async function fetchStats() {
        if(!userId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/stats/${userId}`);
            const d = await res.json();
            document.getElementById('sTotal').innerText = d.total ?? 0; 
            document.getElementById('sTime').innerText = d.total_time ?? "0h 0m";
            document.getElementById('sMood').innerText = d.dominant ?? "Initial Scan";
            document.getElementById('sStreak').innerText = d.streak ?? "0 Days";
        } catch(e) { console.error("Stats Fetch Error:", e); }
    }

    function runTimer() {
        clearInterval(timerInterval);
        document.getElementById('goalBarContainer').style.display = 'block';
        timerInterval = setInterval(() => {
            if (isPaused) return;
            seconds++;
            let m = Math.floor(seconds / 60), s = (seconds % 60);
            document.getElementById('sessionTimer').innerText = `SESSION: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            let goal = parseInt(document.getElementById('timeGoal').value) || 25;
            let percent = (seconds / (goal * 60)) * 100;
            document.getElementById('goalBarFill').style.width = Math.min(percent, 100) + "%";
        }, 1000);
    }

    function toggleInsights() { document.body.classList.toggle('show-insights'); }
    function toggleTheme() { document.body.dataset.theme = document.getElementById('themeTog').checked ? 'dark' : ''; }
    function adjustGoal(a) { 
        let i = document.getElementById('timeGoal'); 
        i.value = Math.max(1, parseInt(i.value) + a); 
    }
    function updateAura() {
        const mood = document.getElementById('moodInput').value;
        const colors = {
            "focus": "#6c63ff", "deepwork": "#4a4a8a", "kickstart": "#ffcc00",
            "unmotivated": "#ff6600", "happy": "#ffeb3b", "anxious": "#81c784",
            "stressed": "#4db6ac", "socially-drained": "#90a4ae", 
            "heartbroken": "#f06292", "sleepy": "#5c6bc0"
        };
        const color = colors[mood] || '#6c63ff';
        document.documentElement.style.setProperty('--aura', color + '4D'); 
        document.documentElement.style.setProperty('--accent', color);
    }

    function logout() { sessionStorage.removeItem('zentune_id'); location.reload(); }
    function openGuide() { document.getElementById('guideOverlay').style.display = 'flex'; }
    function closeGuide() { document.getElementById('guideOverlay').style.display = 'none'; }
    function resetSessionState() { clearInterval(timerInterval); seconds = 0; }
    function shuffle() { if (trackPool.length > 1) playTrack(Math.floor(Math.random() * trackPool.length)); }
    function togglePlayPause() { if (ytPlayer) isPaused ? ytPlayer.playVideo() : ytPlayer.pauseVideo(); }
    function stopSession() { location.reload(); } // Safest way to reset everything
    function changeVolume(val) { if (ytPlayer && ytPlayer.setVolume) ytPlayer.setVolume(val); }
</script>
