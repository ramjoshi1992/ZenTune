<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenTune Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 95%;
            max-width: 1200px;
            margin-top: 20px;
        }

        /* Stats Panel */
        .insights-panel {
            flex: 1;
            min-width: 280px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            height: fit-content;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Main Player Area */
        .aura-container {
            flex: 2;
            min-width: 320px;
            text-align: center;
        }

        #player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
        }

        input, select, button {
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        input, select {
            background: #334155;
            color: white;
        }

        button {
            background: var(--accent);
            color: #0f172a;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }

        button:active { transform: scale(0.96); }

        #status-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* Responsive Fix (Stacks only on small phones) */
        @media (max-width: 850px) {
            .container { flex-direction: column; align-items: center; }
            .insights-panel, .aura-container { width: 100%; }
        }
    </style>
</head>
<body>

    <h1 style="margin-top: 30px; letter-spacing: -1px;">ZenTune <span style="color:var(--accent)">Pro</span></h1>

    <div class="container">
        <div class="insights-panel">
            <h3>Personal Insights</h3>
            <div class="stat-card">
                <small>Total Focus Time</small>
                <h2 id="total-time">0m</h2>
            </div>
            <div class="stat-card">
                <small>Core Frequency</small>
                <h2 id="top-mood">None</h2>
            </div>
        </div>

        <div class="aura-container">
            <div id="player-wrapper">
                <div id="player"></div>
            </div>

            <div class="controls">
                <input type="text" id="user-id" placeholder="Enter User ID (e.g., Ram)">
                
                <select id="mood-select">
                    <option value="Focus">Focus (Alpha Waves)</option>
                    <option value="Anxiety Relief">Anxiety Relief</option>
                    <option value="Energy Boost">Morning Energy</option>
                    <option value="Creative Flow">Creative Flow</option>
                </select>

                <button id="calibrate-btn" onclick="calibrate()">Calibrate Aura</button>
                <div id="status-text">Ready to sync...</div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_BASE_URL = "https://zentune.onrender.com";
        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'enablejsapi': 1,
                    // HARCODED ORIGIN - This fixed the Playback ID error for most
                    'origin': 'https://ramjoshi1992.github.io', 
                    'playsinline': 1,
                    'modestbranding': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            // Mute on start prevents browser from blocking the stream
            event.target.mute(); 
            console.log("Player Initialized Muted");
        }

        async function calibrate() {
            const userId = document.getElementById('user-id').value;
            const mood = document.getElementById('mood-select').value;
            const statusText = document.getElementById('status-text');
            const btn = document.getElementById('calibrate-btn');

            if (!userId) {
                alert("Please enter a User ID first!");
                return;
            }

            // Important: Interaction handshake for mobile/desktop browsers
            if (ytPlayer && ytPlayer.playVideo) {
                ytPlayer.playVideo(); 
                ytPlayer.mute(); 
            }

            statusText.innerText = "Connecting to Auras...";
            btn.innerText = "Syncing...";

            try {
                const response = await fetch(`${API_BASE_URL}/identify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, mood: mood })
                });

                if (!response.ok) throw new Error("Server not responding");

                const data = await response.json();
                
                document.getElementById('total-time').innerText = (data.total_focus_time || 0) + "m";
                document.getElementById('top-mood').innerText = data.dominant_mood || mood;
                
                if (data.preview_url) {
                    // Using loadVideoById with suggestedQuality is more stable
                    ytPlayer.loadVideoById({
                        videoId: data.preview_url,
                        suggestedQuality: 'default'
                    });
                    
                    // Delay unmuting by 1 second to ensure the stream is established
                    setTimeout(() => { ytPlayer.unMute(); }, 1500);
                    statusText.innerText = "Aura Synced!";
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                statusText.innerText = "Server is waking up... Try again in 15s.";
            } finally {
                btn.innerText = "Calibrate Aura";
            }
        }

        function onPlayerError(event) {
            console.warn("YouTube Error Code:", event.data);
            // If restricted, automatically try another video
            if ([101, 150, 153].includes(event.data)) {
                calibrate(); 
            }
        }
    </script>
</body>
</html>
