<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTune Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { 
            --bg: #cfd8dc; --card: #b2beb5; --sidebar: #f0f2f5; --text: #37474f;       
            --accent: #6c63ff; --border: rgba(0,0,0,0.15); --input-bg: #e1e8eb;
            --aura: rgba(108, 99, 255, 0.3);
            --pulse-speed: 4s; --radius-lg: 18px; --radius-md: 12px; --sidebar-width: 260px;
        }
        [data-theme="dark"] { 
            --bg: #0b0e14; --card: #161b22; --text: #efefff; --accent: #9d96ff; 
            --sidebar: #0d1117; --border: rgba(255,255,255,0.1); --input-bg: #0d1117;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; }

        /* UI Fix: Buttons lowered */
        .top-nav { position: fixed; top: 0; right: 0; left: 0; height: 100px; display: flex; justify-content: flex-end; align-items: center; padding: 25px 30px 0; gap: 30px; z-index: 1000; pointer-events: none; }
        .nav-group, .settings-column { pointer-events: auto; }
        .nav-group { display: flex; align-items: center; gap: 15px; margin-right: auto; }
        
        #uidInput { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); outline: none; width: 120px; }
        .login-btn { padding: 8px 18px; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; }

        /* Sidebar Hidden by default */
        .stats-panel { 
            position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-width); 
            background: var(--sidebar); border-right: 1px solid var(--border); 
            padding: 110px 20px 20px; display: flex; flex-direction: column; gap: 12px; 
            transition: transform 0.5s ease; z-index: 900; transform: translateX(-100%);
        }
        body.show-stats .stats-panel { transform: translateX(0); }

        .stat-card { background: var(--card); padding: 15px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .stat-val { font-size: 15px; font-weight: 700; color: var(--accent); }

        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; }
        
        .card { 
            background: var(--card); padding: 25px 30px; border-radius: 24px; 
            width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border);
            box-shadow: 0 0 50px var(--aura); animation: pulseAura var(--pulse-speed) infinite alternate ease-in-out;
        }

        @keyframes pulseAura { 0% { box-shadow: 0 0 20px var(--aura); } 100% { box-shadow: 0 0 70px var(--aura); } }
        
        .timer { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 5px; }
        .goal-adjuster, .volume-adjuster { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .adj-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: var(--radius-md); cursor: pointer; font-weight: bold; }
        
        input[type="number"] { text-align: center; width: 100%; height: 40px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-weight: bold; outline: none; }
        select { width: 100%; height: 44px; padding: 0 15px; margin: 8px 0; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--input-bg); color: var(--text); outline: none; cursor: pointer; }

        .cal-btn { width: 100%; height: 44px; background: var(--accent); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; margin-top: 10px; }
        .control-btns { display: none; gap: 8px; margin-top: 12px; }
        .icon-btn { flex: 1; background: #4a4a8a; border: none; border-radius: var(--radius-md); color: white; padding: 10px; cursor: pointer; }

        .video-box { width: 100%; margin: 15px auto 0; aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden; display: none; background: #000; }
        
        .settings-column { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .theme-container { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #999; border-radius: 20px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        #focBtn { background: #4a4a8a; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body data-theme="dark">

    <nav class="top-nav">
        <div class="nav-group">
            <div id="loginForm">
                <input type="text" id="uidInput" placeholder="User ID">
                <button onclick="login()" class="login-btn">Login</button>
            </div>
            <div id="userGreeting" style="display:none; font-size: 13px; font-weight:bold;">
                <span id="userLabel"></span> 
                <span onclick="logout()" style="color:#ff4d4d; cursor:pointer; margin-left:10px; font-size:10px; text-decoration:underline;">LOGOUT</span>
            </div>
        </div>

        <div class="settings-column">
            <div class="theme-container">
                Flow Safeguard
                <label class="switch"><input type="checkbox" id="flowTog" checked><span class="slider"></span></label>
            </div>
            <div class="theme-container">
                Dark Mode
                <label class="switch"><input type="checkbox" id="themeTog" checked onclick="toggleTheme()"><span class="slider"></span></label>
            </div>
            <button onclick="toggleInsights()" id="focBtn">SHOW INSIGHTS</button>
        </div>
    </nav>

    <aside class="stats-panel" id="statsPanel">
        <h3 style="margin-top:0; font-size:16px;">Insights</h3>
        <div class="stat-card"><div class="stat-val" id="sTotal">0</div><div style="font-size:9px; opacity:0.6;">SESSIONS</div></div>
        <div class="stat-card"><div class="stat-val" id="sTime">0h 0m</div><div style="font-size:9px; opacity:0.6;">TOTAL TIME</div></div>
        <div class="stat-card"><div class="stat-val" id="sMood">Initial Scan</div><div style="font-size:9px; opacity:0.6;">CORE FREQ</div></div>
    </aside>

    <main class="main-content">
        <div class="card" id="mainCard">
            <h1 style="margin: 0 0 5px 0; font-size: 22px;">ZenTune</h1>
            <div class="timer" id="sessionTimer">00:00</div>
            
            <div style="text-align:left; font-size:9px; font-weight:bold; margin-top:10px;">FREQUENCY</div>
            <select id="moodInput" onchange="updateAura()">
                <optgroup label="Productivity">
                    <option value="focus">Focus & Concentration</option>
                    <option value="kickstart">Morning Kickstart</option>
                    <option value="unmotivated">Energy Boost</option>
                </optgroup>
                <optgroup label="Emotional Balance">
                    <option value="happy">Pure Joy / Upbeat</option>
                    <option value="anxious">Relieve Anxiety</option>
                    <option value="heartbroken">Emotional Healing</option>
                    <option value="socially-drained">Social Recharge</option>
                </optgroup>
                <optgroup label="Rest">
                    <option value="stressed">De-stress & Meditate</option>
                    <option value="sleepy">Deep Sleep Prep</option>
                </optgroup>
            </select>

            <div style="text-align:left; font-size:9px; font-weight:bold; margin-top:10px;">TIME GOAL</div>
            <div class="goal-adjuster">
                <button class="adj-btn" onclick="adjustGoal(-1)">-</button>
                <input type="number" id="timeGoal" value="25">
                <button class="adj-btn" onclick="adjustGoal(1)">+</button>
            </div>

            <div style="text-align:left; font-size:9px; font-weight:bold; margin-top:10px;">VOLUME</div>
            <div class="volume-adjuster">
                <button class="adj-btn" onclick="adjustVolume(-10)">-</button>
                <input type="range" id="volSlider" min="0" max="100" value="100" style="flex:1;" oninput="setVolume(this.value)">
                <button class="adj-btn" onclick="adjustVolume(10)">+</button>
            </div>

            <button class="cal-btn" onclick="calibrate()" id="calBtn">Calibrate</button>
            
            <div class="control-btns" id="sessionControls">
                <button class="icon-btn" onclick="togglePlayPause()" id="playPauseBtn">Pause</button>
                <button class="icon-btn" onclick="shuffle()">Shuffle</button>
                <button class="icon-btn" onclick="stopSession()" style="background:#ff4d4d;">Stop</button>
            </div>

            <div id="result" class="video-box"><div id="player"></div></div>
            <p id="trackTitle" style="font-size:10px; margin-top:8px; font-weight:600;"></p>
        </div>
    </main>

<script>
    const API_BASE_URL = 'https://zentune.onrender.com';
    let ytPlayer, timerInterval, seconds = 0, isPaused = false, trackPool = [], poolIdx = 0;
    let userId = sessionStorage.getItem('zentune_id'); 
    let userVolSetting = 100;

    function toggleTheme() { document.body.dataset.theme = document.getElementById('themeTog').checked ? 'dark' : ''; }
    function toggleInsights() {
        document.body.classList.toggle('show-stats');
        document.getElementById('focBtn').innerText = document.body.classList.contains('show-stats') ? "HIDE INSIGHTS" : "SHOW INSIGHTS";
    }

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', { events: { 'onStateChange': onPlayerStateChange } });
    }

    function onPlayerStateChange(event) {
        const videoData = ytPlayer.getVideoData();
        const isAd = ytPlayer.getDuration() < 61 && videoData.title === "";
        if (event.data == YT.PlayerState.PLAYING) {
            if (isAd) {
                userVolSetting = document.getElementById('volSlider').value;
                ytPlayer.setVolume(0); 
                clearInterval(timerInterval);
                document.getElementById('playPauseBtn').innerText = "Ad Playing...";
            } else {
                ytPlayer.setVolume(userVolSetting);
                isPaused = false;
                document.getElementById('playPauseBtn').innerText = "Pause";
                runTimer();
            }
        } else if (event.data == YT.PlayerState.PAUSED) {
            clearInterval(timerInterval);
        }
    }

    function runTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isPaused) return;
            seconds++;
            document.getElementById('sessionTimer').innerText = `${Math.floor(seconds/60).toString().padStart(2,'0')}:${(seconds%60).toString().padStart(2,'0')}`;
        }, 1000);
    }

    async function calibrate() {
        const mood = document.getElementById('moodInput').value;
        const btn = document.getElementById('calBtn');
        btn.innerText = "Analyzing..."; btn.disabled = true;
        try {
            const res = await fetch(`${API_BASE_URL}/identify`, {
                method:'POST', headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({mood:mood, user_id: userId || "guest"})
            });
            const data = await res.json();
            if(data.status==='success' && data.tracks.length > 0) { 
                trackPool=data.tracks; poolIdx=0; 
                const url = trackPool[0].preview_url;
                const vidId = url.includes('embed/') ? url.split('embed/')[1] : url;
                ytPlayer.loadVideoById(vidId);
                document.getElementById('trackTitle').innerText = trackPool[0].title;
                document.getElementById('result').style.display='block';
                document.getElementById('sessionControls').style.display='flex';
                seconds = 0; runTimer();
            }
        } catch(e) { console.error(e); }
        btn.innerText = "Calibrate"; btn.disabled = false;
    }

    function setVolume(val) { userVolSetting = val; if(ytPlayer?.setVolume) ytPlayer.setVolume(val); }
    function adjustVolume(v) { let n = Math.min(Math.max(parseInt(userVolSetting)+v, 0), 100); document.getElementById('volSlider').value = n; setVolume(n); }
    function adjustGoal(v) { let i = document.getElementById('timeGoal'); i.value = Math.max(1, parseInt(i.value)+v); }
    function togglePlayPause() { if(isPaused) ytPlayer.playVideo(); else ytPlayer.pauseVideo(); isPaused = !isPaused; }
    function shuffle() { 
        poolIdx = (poolIdx + 1) % trackPool.length;
        const vidId = trackPool[poolIdx].preview_url.split('embed/')[1] || trackPool[poolIdx].preview_url;
        ytPlayer.loadVideoById(vidId);
        document.getElementById('trackTitle').innerText = trackPool[poolIdx].title;
    }
    function stopSession() {
        clearInterval(timerInterval);
        if(ytPlayer?.stopVideo) ytPlayer.stopVideo();
        document.getElementById('result').style.display = 'none';
        document.getElementById('sessionControls').style.display = 'none';
    }
</script>
</body>
</html>
