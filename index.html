<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTune Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            width: 95%;
            max-width: 1200px;
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Sidebar - Insights */
        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-right: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box h2 {
            margin: 5px 0;
            color: var(--accent);
        }

        /* Main Content - Player & Toggles */
        .main-content {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .controls-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input, select, button {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #334155;
            color: white;
            font-size: 0.95rem;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        #status {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="sidebar">
            <h3 style="margin-top:0">Insights</h3>
            <div class="stat-box">
                <small>Total Minutes</small>
                <h2 id="total-minutes">0</h2>
            </div>
            <div class="stat-box">
                <small>Top Mood</small>
                <h2 id="top-mood" style="font-size: 1.1rem;">None</h2>
            </div>
            <div class="stat-box">
                <small>Session Streak</small>
                <h2 id="streak">0</h2>
            </div>
        </div>

        <div class="main-content">
            <div class="controls-row">
                <input type="text" id="user-id" placeholder="Login (e.g. Ram)">
                
                <div class="toggle-group">
                    <span>Mode:</span>
                    <select id="mode-toggle">
                        <option value="Standard">Standard</option>
                        <option value="Deep">Deep Dive</option>
                    </select>
                </div>

                <div class="toggle-group">
                    <span>Focus Model:</span>
                    <select id="focus-model">
                        <option value="Alpha">Alpha Waves</option>
                        <option value="Beta">Beta Concentration</option>
                    </select>
                </div>
            </div>

            <div id="video-container">
                <div id="player"></div>
            </div>

            <div class="controls-row">
                <select id="mood-select" style="flex-grow: 1;">
                    <optgroup label="Work & Study">
                        <option value="Focus">Focus</option>
                        <option value="Creative Flow">Creative Flow</option>
                    </optgroup>
                    <optgroup label="Relaxation">
                        <option value="Anxiety Relief">Anxiety Relief</option>
                        <option value="Deep Sleep Prep">Deep Sleep Prep</option>
                    </optgroup>
                </select>
                <button onclick="calibrate()">Calibrate Aura</button>
            </div>
            <div id="status">Ready to sync session data.</div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const API_URL = "https://zentune.onrender.com";
        let player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'enablejsapi': 1,
                    // Minimal parameters to avoid Playback ID errors on desktop
                },
                events: {
                    'onReady': () => console.log("System Ready")
                }
            });
        }

        async function calibrate() {
            const user = document.getElementById('user-id').value;
            const mood = document.getElementById('mood-select').value;
            const status = document.getElementById('status');

            if (!user) return alert("Please login with your User ID");

            status.innerText = "Syncing with Render...";

            try {
                const res = await fetch(`${API_URL}/identify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user_id: user, 
                        mood: mood,
                        mode: document.getElementById('mode-toggle').value,
                        model: document.getElementById('focus-model').value
                    })
                });

                const data = await res.json();

                // Restore session data updates
                document.getElementById('total-minutes').innerText = data.total_focus_time || 0;
                document.getElementById('top-mood').innerText = data.dominant_mood || mood;
                document.getElementById('streak').innerText = data.streak || 0;

                if (data.preview_url) {
                    player.loadVideoById(data.preview_url);
                    status.innerText = "Aura Synced!";
                }

            } catch (err) {
                status.innerText = "Connection error. Retrying...";
                console.error(err);
            }
        }
    </script>
</body>
</html>
