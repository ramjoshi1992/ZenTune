<script>
    const API_BASE_URL = 'https://zentune.onrender.com';

    let ytPlayer, trackPool = [], poolIdx = 0, timerInterval = null, seconds = 0;
    let isPaused = false, goalReached = false, isFlowing = false;
    let userId = localStorage.getItem('zentune_id');
    let originalGoalMins = 25; 

    // MODIFIED: window.onload now explicitly triggers fetchStats
    window.onload = () => { 
        if(userId) {
            showUser(userId);
            fetchStats(); 
        }
        updateAura(); 
    };

    // ... (Keep your existing onYouTubeIframeAPIReady and related functions) ...

    function showUser(id) { 
        document.getElementById('loginForm').style.display = 'none'; 
        document.getElementById('userGreeting').style.display = 'block'; 
        document.getElementById('userLabel').innerText = `Welcome, ${id}`; 
        // We call fetchStats in onload, so no need to repeat it here if preferred
    }

    // MODIFIED: Added cache-busting and extra safety checks
    async function fetchStats() {
        if(!userId) return;
        try {
            // Adding ?t= timestamp prevents GitHub/Browser from serving a cached "0" response
            const res = await fetch(`${API_BASE_URL}/stats/${userId}?t=${Date.now()}`);
            if (!res.ok) throw new Error("Server response not OK");
            
            const d = await res.json();
            
            // Only update the UI if the data exists to avoid overwriting with undefined
            document.getElementById('sTotal').innerText = d.total ?? 0; 
            document.getElementById('sTime').innerText = d.total_time ?? "0h 0m";
            document.getElementById('sMood').innerText = d.dominant ?? "Initial Scan";
            document.getElementById('sStreak').innerText = d.streak ?? "0 Days";
            
            console.log("Stats successfully synced for:", userId);
        } catch(e) { 
            console.error("Critical: Stats Sync Failed.", e);
            // Optional: Alert the user if the backend is down
        }
    }

    // ... (Keep the rest of your calibrate, timer, and save functions as they were) ...

    async function saveSessionToDB() {
        if(!userId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/stop`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    duration: Math.floor(seconds),
                    mood: document.getElementById('moodInput').value
                })
            });
            if(res.ok) fetchStats(); // Refresh insights immediately after saving
        } catch(e) { 
            console.error("Save Error:", e); 
        }
    }
</script>
