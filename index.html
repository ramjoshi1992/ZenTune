<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenTune Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            width: 95%;
            max-width: 1200px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Stats Panel */
        .insights-panel {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Main Player Area */
        .aura-container {
            flex: 2;
            min-width: 300px;
            text-align: center;
        }

        #player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
        }

        select, button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        select {
            background: #334155;
            color: white;
        }

        button {
            background: var(--accent);
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            /* Mobile Fixes */
            position: relative;
            z-index: 1000;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        button:active {
            transform: scale(0.98);
            background: #7dd3fc;
        }

        #status-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        /* Responsive Mobile Layout */
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .insights-panel, .aura-container { width: 100%; }
            button { height: 55px; }
        }
    </style>
</head>
<body>

    <h1 style="margin-top: 20px; letter-spacing: -1px;">ZenTune <span style="color:var(--accent)">Pro</span></h1>

    <div class="container">
        <div class="insights-panel">
            <h3>Personal Insights</h3>
            <div class="stat-card">
                <small>Total Focus Time</small>
                <h2 id="total-time">0m</h2>
            </div>
            <div class="stat-card">
                <small>Core Frequency</small>
                <h2 id="top-mood">None</h2>
            </div>
            <div class="stat-card">
                <small>Session Streak</small>
                <h2 id="streak">0</h2>
            </div>
        </div>

        <div class="aura-container">
            <div id="player-wrapper">
                <div id="player"></div>
            </div>

            <div class="controls">
                <input type="text" id="user-id" placeholder="Enter User ID (e.g., Ram)" 
                       style="padding:10px; border-radius:8px; border:none; margin-bottom:10px;">
                
                <select id="mood-select">
                    <option value="Focus">Focus (Alpha Waves)</option>
                    <option value="Anxiety Relief">Anxiety Relief (Theta)</option>
                    <option value="Deep Sleep Prep">Deep Sleep Prep</option>
                    <option value="Energy Boost">Morning Energy</option>
                    <option value="Creative Flow">Creative Flow</option>
                </select>

                <button id="calibrate-btn" onclick="calibrate()" ontouchstart="">Calibrate Aura</button>
                <div id="status-text">Ready to sync...</div>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // CONFIGURATION - MUST BE HTTPS
        const API_BASE_URL = "https://zentune.onrender.com";
        let ytPlayer;

        // Initialize YouTube Player
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%',
                width: '100%',
                playerVars: {
                    'autoplay': 1,
                    'controls': 1,
                    'enablejsapi': 1,
                    'origin': 'https://ramjoshi1992.github.io', // Dynamic origin for GitHub
                    'playsinline': 1,               // Crucial for iPhone
                    'rel': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            console.log("Player is ready");
        }

        async function calibrate() {
            const userId = document.getElementById('user-id').value;
            const mood = document.getElementById('mood-select').value;
            const statusText = document.getElementById('status-text');
            const btn = document.getElementById('calibrate-btn');

            if (!userId) {
                alert("Please enter a User ID first!");
                return;
            }

            // Mobile Handshake: Prime the player immediately on tap
            if (ytPlayer && ytPlayer.playVideo) {
                ytPlayer.playVideo(); 
                ytPlayer.mute(); 
            }

            statusText.innerText = "Analyzing Frequencies...";
            btn.innerText = "Syncing...";

            try {
                const response = await fetch(`${API_BASE_URL}/identify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, mood: mood })
                });

                if (!response.ok) throw new Error("Server sleeping");

                const data = await response.json();
                
                // Update UI from Backend
                document.getElementById('total-time').innerText = (data.total_focus_time || 0) + "m";
                document.getElementById('top-mood').innerText = data.dominant_mood || mood;
                
                // Load Video
                if (data.preview_url) {
                    ytPlayer.loadVideoById(data.preview_url);
                    ytPlayer.unMute();
                    statusText.innerText = "Aura Synced Successfully!";
                }
            } catch (error) {
                console.error("Error:", error);
                statusText.innerText = "Server waking up... Tap again in 10 seconds.";
            } finally {
                btn.innerText = "Calibrate Aura";
            }
        }

        function onPlayerError(event) {
            console.warn("YouTube Error:", event.data);
            // If video is restricted (101/150/153), try to calibrate again or skip
            if ([101, 150, 153].includes(event.data)) {
                document.getElementById('status-text').innerText = "Video restricted. Auto-shuffling...";
                calibrate(); 
            }
        }

        function onPlayerStateChange(event) {
            // Handle video end or transitions here if needed
        }
    </script>
</body>
</html>
