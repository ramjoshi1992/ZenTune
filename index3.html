<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenTune Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root { 
            --bg: #cfd8dc; --card: #b2beb5; --sidebar: #f0f2f5; --text: #37474f;       
            --accent: #6c63ff; --border: rgba(0,0,0,0.15); --input-bg: #e1e8eb;
            --aura: rgba(108, 99, 255, 0.3);
            --pulse-speed: 4s; 
            --radius-lg: 18px;
            --radius-md: 12px;
            --sidebar-width: 260px;
        }
        [data-theme="dark"] { 
            --bg: #0b0e14; --card: #161b22; --text: #efefff; --accent: #9d96ff; 
            --sidebar: #0d1117; --border: rgba(255,255,255,0.1); --input-bg: #0d1117;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; transition: 0.5s ease; }

        .top-nav { position: fixed; top: 0; right: 0; left: 0; height: 80px; display: flex; justify-content: flex-end; align-items: center; padding: 0 30px; gap: 30px; z-index: 1000; pointer-events: none; }
        .nav-group, .settings-column { pointer-events: auto; }
        .nav-group { display: flex; align-items: center; gap: 15px; margin-right: auto; }
        
        #uidInput { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); outline: none; width: 120px; }
        .login-btn { padding: 8px 18px; border-radius: 20px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }

        .stats-panel { 
            position: fixed; left: 0; top: 0; bottom: 0;
            width: var(--sidebar-width); background: var(--sidebar); border-right: 1px solid var(--border); 
            padding: 90px 20px 20px; display: flex; flex-direction: column; gap: 12px; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 900; 
        }
        body.focus-active .stats-panel { transform: translateX(-100%); }

        .stat-card { background: var(--card); padding: 15px; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .stat-val { font-size: 15px; font-weight: 700; color: var(--accent); }

        .main-content { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; justify-content: center; align-items: center; 
            transition: all 0.5s ease; 
        }
        
        .card { 
            background: var(--card); padding: 25px 30px; border-radius: 24px; 
            width: 100%; max-width: 320px; text-align: center; 
            border: 1px solid var(--border); position: relative; 
            box-shadow: 0 0 50px var(--aura); 
            animation: pulseAura var(--pulse-speed) infinite alternate ease-in-out;
            max-height: 90vh; display: flex; flex-direction: column; justify-content: center;
        }

        @keyframes pulseAura { 0% { box-shadow: 0 0 20px var(--aura); } 100% { box-shadow: 0 0 70px var(--aura); } }
        .card.goal-reached { animation: goalPulse 0.5s infinite alternate; border: 2px solid gold; }
        @keyframes goalPulse { 0% { box-shadow: 0 0 20px gold; } 100% { box-shadow: 0 0 60px gold; } }

        .progress-container { width: 100%; height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; margin: 10px 0 15px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; width: 0%; background: var(--accent); border-radius: 10px; transition: width 0.4s ease; }
        
        .timer { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 5px; letter-spacing: 1px; }
        
        .goal-adjuster { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
        .adj-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: var(--radius-md); cursor: pointer; font-size: 18px; font-weight: bold; }
        
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            text-align: center; width: 100%; height: 40px; padding: 0 10px; margin: 6px 0; 
            border-radius: var(--radius-md); border: 1px solid var(--border); 
            background: var(--input-bg); color: var(--text); font-size: 14px; 
            font-weight: bold; outline: none;
        }
        
        select {
            appearance: none; -webkit-appearance: none; width: 100%; height: 44px; padding: 0 15px; margin: 8px 0; 
            border-radius: var(--radius-md); border: 1px solid var(--border); 
            background: var(--input-bg); color: var(--text); font-size: 14px; outline: none; cursor: pointer;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236c63ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px;
        }

        .cal-btn { width: 100%; height: 44px; background: var(--accent); color: white; border: none; border-radius: var(--radius-md); font-weight: 700; cursor: pointer; margin-top: 10px; }
        .cal-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .continue-btn { background: #28a745 !important; animation: bounce 2s infinite; display: none; margin-top: 10px; }

        .control-btns { display: none; gap: 8px; margin-top: 12px; }
        .icon-btn { flex: 1; background: #4a4a8a; border: none; border-radius: var(--radius-md); color: white; padding: 10px; cursor: pointer; font-size: 14px; }
        .stop-btn { background: #ff4d4d; }

        .video-box { width: 100%; margin: 15px auto 0; aspect-ratio: 16/9; border-radius: var(--radius-md); overflow: hidden; display: none; background: #000; }
        
        .settings-column { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        .theme-container { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #999; border-radius: 20px; transition: 0.4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.4s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        #focBtn { background: #4a4a8a; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-group">
            <div id="loginForm">
                <input type="text" id="uidInput" placeholder="User ID">
                <button onclick="login()" class="login-btn">Login</button>
            </div>
            <div id="userGreeting" style="display:none; font-size: 13px; font-weight:bold;">
                <span id="userLabel"></span> 
                <span onclick="logout()" style="color:#ff4d4d; cursor:pointer; margin-left:10px; font-size:10px; text-decoration:underline;">LOGOUT</span>
            </div>
        </div>

        <div class="settings-column">
            <div class="theme-container">
                Flow Safeguard
                <label class="switch"><input type="checkbox" id="flowTog" checked><span class="slider"></span></label>
            </div>
            <div class="theme-container">
                Dark Mode
                <label class="switch"><input type="checkbox" id="themeTog" onclick="toggleTheme()"><span class="slider"></span></label>
            </div>
            <button onclick="toggleFocus()" id="focBtn">FOCUS MODE: OFF</button>
        </div>
    </nav>

    <aside class="stats-panel">
        <h3 style="margin-top:0; font-size:16px;">Insights</h3>
        <div class="stat-card"><div class="stat-val" id="sTotal">0</div><div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Sessions</div></div>
        <div class="stat-card"><div class="stat-val" id="sTime">0h 0m</div><div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Total Focus Time</div></div>
        <div class="stat-card"><div class="stat-val" id="sMood">Initial Scan</div><div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Core Frequency</div></div>
        <div class="stat-card"><div class="stat-val" id="sStreak">0 Days</div><div style="font-size:9px; opacity:0.6; text-transform:uppercase;">Streak</div></div>
    </aside>

    <main class="main-content">
        <div class="card" id="mainCard">
            <h1 style="margin: 0 0 5px 0; font-size: 22px;">ZenTune</h1>
            <div class="timer" id="sessionTimer">SESSION: 00:00</div>
            
            <div class="progress-container" id="goalBarContainer">
                <div class="progress-fill" id="goalBarFill"></div>
            </div>
            
            <div style="text-align:left; font-size:9px; font-weight:bold; margin-bottom:4px; opacity:0.8; text-transform:uppercase;">Frequency</div>
            <select id="moodInput" onchange="updateAura()">
                <optgroup label="Productivity">
                    <option value="focus">Focus & Concentration</option>
                    <option value="kickstart">Morning Kickstart</option>
                    <option value="unmotivated">Energy Boost</option>
                </optgroup>
                <optgroup label="Emotional Balance">
                    <option value="happy">Pure Joy / Upbeat</option>
                    <option value="anxious">Relieve Anxiety</option>
                    <option value="heartbroken">Emotional Healing</option>
                    <option value="socially-drained">Social Recharge</option>
                </optgroup>
                <optgroup label="Rest">
                    <option value="stressed">De-stress & Meditate</option>
                    <option value="sleepy">Deep Sleep Prep</option>
                </optgroup>
            </select>

            <div style="text-align:left; font-size:9px; font-weight:bold; margin-top:8px; opacity:0.8; text-transform:uppercase;">Time Goal (Mins)</div>
            <div class="goal-adjuster">
                <button class="adj-btn" onclick="adjustGoal(-1)">-</button>
                <input type="number" id="timeGoal" value="25" min="1">
                <button class="adj-btn" onclick="adjustGoal(1)">+</button>
            </div>

            <button class="cal-btn" onclick="calibrate()" id="calBtn">Calibrate</button>
            <button class="cal-btn continue-btn" id="continueBtn" onclick="continueSession()">Continue Session</button>
            
            <div class="control-btns" id="sessionControls">
                <button class="icon-btn" onclick="togglePlayPause()" id="playPauseBtn">Pause</button>
                <button class="icon-btn" onclick="shuffle()">Shuffle</button>
                <button class="icon-btn stop-btn" onclick="stopSession()">Stop</button>
            </div>

            <div id="result" class="video-box"><div id="player"></div></div>
            <p id="trackTitle" style="font-size:10px; margin-top:8px; font-weight:600;"></p>
        </div>
    </main>

<script>
    // --- API CONFIGURATION ---
    const API_BASE_URL = 'https://zentune.onrender.com';

    let ytPlayer, trackPool = [], poolIdx = 0, timerInterval = null, seconds = 0;
    let isPaused = false, goalReached = false, isFlowing = false;
    let userId = localStorage.getItem('zentune_id');
    let originalGoalMins = 25; 

    window.onload = () => { if(userId) showUser(userId); updateAura(); };

    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('player', { height: '100%', width: '100%', playerVars: { 'autoplay': 1, 'controls': 1, 'enablejsapi': 1 }, events: { 'onStateChange': onPlayerStateChange } });
    }

    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            isPaused = false;
            document.getElementById('playPauseBtn').innerText = "Pause";
            runTimer();
        } else if (event.data == YT.PlayerState.PAUSED) {
            isPaused = true;
            document.getElementById('playPauseBtn').innerText = "Play";
            clearInterval(timerInterval);
        }
    }

    function togglePlayPause() {
        if (!ytPlayer || !ytPlayer.pauseVideo) return;
        if (isPaused) ytPlayer.playVideo(); else ytPlayer.pauseVideo();
    }

    function adjustGoal(amount) {
        const input = document.getElementById('timeGoal');
        let val = parseInt(input.value) || 0;
        val = Math.max(1, val + amount);
        input.value = val;
        originalGoalMins = val;
        if (timerInterval) updateProgressBar();
    }

    function toggleTheme() { document.body.dataset.theme = document.getElementById('themeTog').checked ? 'dark' : ''; }
    
    function toggleFocus() { 
        document.body.classList.toggle('focus-active'); 
        const active = document.body.classList.contains('focus-active');
        document.getElementById('focBtn').innerText = active ? "FOCUS MODE: ON" : "FOCUS MODE: OFF";
    }

    function updateAura() {
        const mood = document.getElementById('moodInput').value;
        const colors = { 
            focus: "rgba(16, 185, 129, 0.4)", happy: "rgba(245, 158, 11, 0.4)", kickstart: "rgba(249, 115, 22, 0.4)",
            anxious: "rgba(168, 85, 247, 0.4)", stressed: "rgba(20, 184, 166, 0.4)", heartbroken: "rgba(244, 114, 182, 0.4)",
            unmotivated: "rgba(239, 68, 68, 0.4)", "socially-drained": "rgba(14, 165, 233, 0.4)", sleepy: "rgba(30, 58, 138, 0.5)"
        };
        document.documentElement.style.setProperty('--aura', colors[mood] || "rgba(157, 150, 255, 0.3)");
    }

    async function login() {
        const id = document.getElementById('uidInput').value.trim();
        if(!id) return;
        try {
            const res = await fetch(`${API_BASE_URL}/auth`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:id})});
            const data = await res.json();
            if(data.status==='success') { 
                userId = data.user_id; 
                localStorage.setItem('zentune_id', userId); 
                stopSession(); 
                showUser(userId); 
            }
        } catch(e) { console.error("Login Error:", e); }
    }

    function showUser(id) { 
        document.getElementById('loginForm').style.display='none'; 
        document.getElementById('userGreeting').style.display='block'; 
        document.getElementById('userLabel').innerText = `Welcome, ${id}`; 
        fetchStats(); 
    }
    
    function logout() { 
        if (seconds > 5) {
            const confirmLogout = confirm("You have an active session. Logout and save progress?");
            if (!confirmLogout) return;
        }

        userId = null;
        localStorage.removeItem('zentune_id'); 
        stopSession(); 
        resetSessionState();
        
        document.getElementById('loginForm').style.display='block'; 
        document.getElementById('userGreeting').style.display='none';
        document.getElementById('uidInput').value = "";
        
        document.getElementById('sTotal').innerText = "0";
        document.getElementById('sTime').innerText = "0h 0m";
        document.getElementById('sMood').innerText = "Initial Scan";
        document.getElementById('sStreak').innerText = "0 Days";
    }

    async function fetchStats() {
        if(!userId) return;
        try {
            const res = await fetch(`${API_BASE_URL}/stats/${userId}`);
            const d = await res.json();
            document.getElementById('sTotal').innerText = d.total ?? 0; 
            document.getElementById('sTime').innerText = d.total_time ?? "0h 0m";
            document.getElementById('sMood').innerText = d.dominant ?? "Initial Scan";
            document.getElementById('sStreak').innerText = d.streak ?? "0 Days";
        } catch(e) { console.error("Stats Error:", e); }
    }

    async function calibrate() {
        const mood = document.getElementById('moodInput').value;
        const btn = document.getElementById('calBtn');
        originalGoalMins = parseInt(document.getElementById('timeGoal').value) || 25;
        
        btn.innerText = "Analyzing...";
        btn.disabled = true;

        try {
            const res = await fetch(`${API_BASE_URL}/identify`, {
                method:'POST', 
                headers:{'Content-Type':'application/json'}, 
                body:JSON.stringify({mood:mood, user_id: userId || "guest"})
            });
            const data = await res.json();
            if(data.status==='success' && data.tracks.length > 0) { 
                trackPool=data.tracks; poolIdx=0; 
                const url = trackPool[0].preview_url;
                const vidId = url.includes('embed/') ? url.split('embed/')[1] : url;
                
                ytPlayer.loadVideoById(vidId);
                document.getElementById('trackTitle').innerText = trackPool[0].title;
                document.getElementById('result').style.display='block';
                document.getElementById('sessionControls').style.display='flex';
                
                resetSessionState();
                runTimer();
            }
        } catch(e) { console.error("Calibration Error:", e); }
        btn.innerText = "Calibrate";
        btn.disabled = false;
    }

    function resetSessionState() {
        clearInterval(timerInterval);
        seconds = 0; 
        goalReached = false; 
        isFlowing = false;
        isPaused = false;
        document.getElementById('continueBtn').style.display = 'none';
        document.getElementById('mainCard').classList.remove('goal-reached');
        document.getElementById('sessionTimer').innerText = `SESSION: 00:00`;
        document.getElementById('goalBarFill').style.width = "0%";
        document.getElementById('goalBarContainer').style.display = 'none';
    }

    function runTimer() {
        clearInterval(timerInterval);
        document.getElementById('goalBarContainer').style.display = 'block';
        timerInterval = setInterval(() => {
            if (isPaused || (goalReached && !isFlowing)) return;
            seconds++;
            let m = Math.floor(seconds / 60);
            let s = (seconds % 60);
            
            let label = isFlowing ? "IN FLOW" : "SESSION";
            document.getElementById('sessionTimer').innerText = `${label}: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            
            updateProgressBar();
            const goalMins = parseInt(document.getElementById('timeGoal').value);
            if (seconds >= (goalMins * 60) && !goalReached) handleGoalReached();
        }, 1000);
    }

    function updateProgressBar() {
        const goalMins = parseInt(document.getElementById('timeGoal').value) || 1;
        let percent = (seconds / (goalMins * 60)) * 100;
        document.getElementById('goalBarFill').style.width = Math.min(percent, 100) + "%";
    }

    function handleGoalReached() {
        goalReached = true;
        const flowActive = document.getElementById('flowTog').checked;
        document.getElementById('mainCard').classList.add('goal-reached');
        
        if (flowActive) {
            isFlowing = true;
        } else {
            clearInterval(timerInterval);
            if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
            document.getElementById('sessionTimer').innerText = "GOAL REACHED";
            document.getElementById('continueBtn').style.display = 'block';
            saveSessionToDB();
        }
    }

    function continueSession() {
        goalReached = false;
        isFlowing = false;
        const currentGoal = parseInt(document.getElementById('timeGoal').value);
        document.getElementById('timeGoal').value = currentGoal + originalGoalMins;
        document.getElementById('continueBtn').style.display = 'none';
        document.getElementById('mainCard').classList.remove('goal-reached');
        if(ytPlayer && ytPlayer.playVideo) ytPlayer.playVideo();
        runTimer();
    }

    function shuffle() { 
        if(trackPool.length > 0) {
            poolIdx=(poolIdx+1)%trackPool.length; 
            let url = trackPool[poolIdx].preview_url;
            let vidId = url.includes('/embed/') ? url.split('/embed/')[1] : url;
            ytPlayer.loadVideoById(vidId);
            document.getElementById('trackTitle').innerText = trackPool[poolIdx].title;
        }
    }

    function stopSession() {
        if (seconds > 5) saveSessionToDB(); 
        resetSessionState();
        document.getElementById('result').style.display='none';
        document.getElementById('sessionControls').style.display='none';
        document.getElementById('trackTitle').innerText = "";
        if(ytPlayer && ytPlayer.stopVideo) ytPlayer.stopVideo();
    }

    async function saveSessionToDB() {
        if(!userId) return;
        try {
            await fetch(`${API_BASE_URL}/stop`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    user_id: userId,
                    duration: seconds,
                    mood: document.getElementById('moodInput').value
                })
            });
            fetchStats(); 
        } catch(e) { 
            console.error("Save Error:", e); 
        }
    }
</script>
</body>
</html>
